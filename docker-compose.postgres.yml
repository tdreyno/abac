services:
  postgres:
    image: postgres:16-alpine
    container_name: he-said-postgres-test
    environment:
      POSTGRES_DB: he_said_test
      POSTGRES_USER: he_said
      POSTGRES_PASSWORD: he_said
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U he_said -d he_said_test"]
      interval: 2s
      timeout: 2s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
