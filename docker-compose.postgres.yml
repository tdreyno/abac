services:
  postgres:
    image: postgres:16-alpine
    container_name: abac-postgres-test
    environment:
      POSTGRES_DB: abac_test
      POSTGRES_USER: abac
      POSTGRES_PASSWORD: abac
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abac -d abac_test"]
      interval: 2s
      timeout: 2s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
